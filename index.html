<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WATCH ONLINE</title><style>
body{
background:#000;
color:#fff;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#ff0000;
font-size:42px;
text-shadow:0 0 20px #ff0000;
margin:10px 0;
}

.subtitle{
font-size:18px;
margin-bottom:20px;
}

.video-box{
max-width:400px;
margin:auto;
border:2px solid #ff0000;
border-radius:20px;
padding:4px;
}

video{
width:100%;
border-radius:16px;
display:block;
cursor:pointer;
}

.gallery{
display:flex;
gap:10px;
justify-content:center;
margin-top:20px;
}

.thumb{
position:relative;
width:48%;
cursor:pointer;
}

.thumb img{
width:100%;
border-radius:12px;
border:1px solid #ff0000;
display:block;
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:50px;
height:50px;
background:rgba(0,0,0,.6);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#fff;
pointer-events:none;
}

.info{
margin-top:25px;
font-size:20px;
line-height:2;
}
</style></head><body><h1>WATCH ONLINE</h1><div class="subtitle">
⚡ INSTANT ACCESS • 18+ ONLY
</div><div class="video-box">
<video id="vid" autoplay muted playsinline>
<source src="VID_20260531_142835_165.mp4" type="video/mp4">
</video>
</div><div class="gallery"><div class="thumb">
<img src="IMG_20260531_195646.jpg">
<div class="play">▶</div>
</div><div class="thumb">
<img src="IMG_20260531_195737.jpg">
<div class="play">▶</div>
</div></div><div class="info">
<div>🔥 Instant Access</div>
<div>🎬 HD Streaming</div>
</div><script>
const LINK = "https://theoreticalassertshame.com/kb35zj0cq8?key=00af729049221004f9a438ff3d9961fd";

const video = document.getElementById("vid");

// pause setelah 3 detik
setTimeout(function(){
    video.pause();
},3000);

// klik video setelah pause
video.addEventListener("click",function(){
    window.location.href = LINK;
});

// klik semua foto
document.querySelectorAll(".thumb").forEach(function(item){
    item.addEventListener("click",function(){
        window.location.href = LINK;
    });
});
</script></body>
</html>
